    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
    .spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* HEADER */
    header { background:var(--green); color:white; padding:12px 20px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.25); display:flex; justify-content:space-between; align-items:center; }
    header div h1 { font-size:1.2rem; font-weight:800; }
    header div p { font-size:0.76rem; opacity:.8; margin-top:1px; }
    .conn-dot { width:10px; height:10px; border-radius:50%; background:#4ade80; flex-shrink:0; box-shadow:0 0 6px #4ade80; }
    .conn-dot.off { background:#f87171; box-shadow:0 0 6px #f87171; }

    /* PLAYER BAR */
    .player-bar { background:white; border-bottom:2px solid var(--border); padding:8px 16px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .player-bar label { font-size:.75rem; color:var(--muted); font-weight:600; margin-right:2px; }
    .player-btn { padding:5px 13px; border-radius:20px; border:2px solid var(--border); background:white; cursor:pointer; font-size:.82rem; font-weight:600; color:var(--text); transition:all .18s; }
    .player-btn:hover { border-color:var(--green); color:var(--green); }
    .player-btn.active { background:var(--green); color:white; border-color:var(--green); }
    .player-btn.free { border-style:dashed; color:var(--muted); }
    .player-btn.free:hover { border-color:var(--green); color:var(--green); }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:16px; }
    .modal-box { background:white; border-radius:14px; padding:20px; max-width:340px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,.3); }
    .modal-box h3 { margin-bottom:6px; }
    .modal-box p { font-size:.82rem; color:var(--muted); margin-bottom:14px; line-height:1.4; }
    .modal-box input { width:100%; padding:10px 12px; border:2px solid var(--border); border-radius:8px; font-size:.95rem; margin-bottom:10px; }
    .modal-box input:focus { outline:none; border-color:var(--green); }
    .modal-box select { width:100%; padding:10px 12px; border:2px solid var(--border); border-radius:8px; font-size:.9rem; margin-bottom:10px; background:white; }
    .modal-box label { font-size:.78rem; color:var(--muted); display:block; margin-bottom:2px; font-weight:700; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }

    nav button:hover { color:var(--green); }
    nav button.active { color:var(--green); border-bottom-color:var(--green); }

    .group-badge.day { background:#f97316; }
    .group-info h3 { font-size:.95rem; font-weight:700; }
    .group-teams { font-size:.75rem; color:var(--muted); margin-top:1px; }

    .match-date { font-size:.72rem; color:var(--muted); }

    .badge-locked { background:#fef3c7; color:#d97706; }
    .badge-done { background:#dbeafe; color:#1d4ed8; }

    .teams-row { display:flex; align-items:center; gap:6px; margin-bottom:9px; }
    .team { flex:1; font-weight:700; font-size:.93rem; }
    .team.away { text-align:right; }
    .vs-sep { font-size:.78rem; color:var(--muted); font-weight:600; flex-shrink:0; }
    .result-score { font-size:1.3rem; font-weight:800; color:var(--green); flex-shrink:0; }

    .mode-btn { flex:1; padding:7px 4px; border-radius:7px; border:2px solid var(--border); background:white; cursor:pointer; font-size:.76rem; font-weight:700; text-align:center; transition:all .15s; line-height:1.3; }
    .mode-btn:hover { border-color:var(--green); }
    .mode-btn.active-winner { border-color:var(--green); background:var(--green); color:white; }
    .mode-btn.active-exact { border-color:#d97706; background:#fffbeb; color:#92400e; }

    .pick-row { display:flex; gap:5px; }
    .pick-btn { flex:1; padding:8px 4px; border-radius:8px; border:2px solid var(--border); background:white; cursor:pointer; font-size:.8rem; font-weight:600; text-align:center; transition:all .15s; }
    .pick-btn:hover { border-color:var(--green); }
    .pick-btn.sel { border-color:var(--green); background:var(--green); color:white; }

    .score-row { display:flex; align-items:center; gap:8px; }
    .score-team { flex:1; font-size:.8rem; font-weight:600; color:var(--muted); }
    .score-team.right { text-align:right; }
    .score-in { width:50px; height:40px; text-align:center; font-size:1.15rem; font-weight:800; border:2px solid var(--border); border-radius:8px; background:white; }
    .score-in:focus { outline:none; border-color:#d97706; }
    .score-dash { font-size:1.1rem; font-weight:800; color:var(--muted); }

    .pred-info.wrong { background:#fef2f2; color:#b91c1c; font-weight:600; }

    .field-group label { display:block; font-size:.78rem; font-weight:700; color:var(--muted); margin-bottom:4px; }
    .field-group input { width:100%; padding:9px 12px; border:2px solid var(--border); border-radius:8px; font-size:.95rem; }

    .admin-in:focus { outline:none; border-color:var(--green); }
    .save-btn { padding:6px 12px; background:var(--green); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:700; font-size:.78rem; white-space:nowrap; }
    .save-btn:hover { background:#0f2b17; }
    .del-btn { padding:6px 10px; background:var(--red); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:700; font-size:.78rem; }
    .saved-label { font-size:.72rem; color:var(--success); font-weight:700; text-align:right; margin:-3px 0 6px; }

    /* FILTER BAR */
    .filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .fbtn { padding:5px 12px; border-radius:16px; border:2px solid var(--border); background:white; cursor:pointer; font-size:.78rem; font-weight:700; transition:all .15s; }
    .fbtn:hover { border-color:var(--green); }
    .fbtn.active { background:var(--green); color:white; border-color:var(--green); }

    /* RULES */
    .rules-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
    .rule-item { background:#f9fafb; border-radius:8px; padding:10px 12px; font-size:.82rem; line-height:1.4; }
    .rule-item strong { color:var(--green); display:block; margin-bottom:2px; }

    /* UTILS */
    .btn { display:inline-block; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; font-size:.9rem; font-weight:700; transition:all .15s; background:var(--border); color:var(--text); }
    .btn-green { background:var(--green); color:white; }
    .btn-green:hover { background:#0f2b17; }
    .btn-orange { background:#f97316; color:white; }
    .btn-red { background:var(--red); color:white; }
    hr.divider { border:none; border-top:1px solid var(--border); margin:14px 0; }

    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media (max-width:480px) {
      .setup-grid { grid-template-columns:1fr; }
      .rules-grid { grid-template-columns:1fr; }
      .team { font-size:.82rem; }
    }
  </style>
</head>

let autoSyncRunning = false;
async function autoSyncFromESPN() {
  if (autoSyncRunning) return;
  autoSyncRunning = true;
  try {
    const today = new Date();
    // Scan: 3 días hacia atrás (resultados recientes) + 18 días hacia delante
    // (fixtures de eliminatorias ya definidos pero no jugados aún).
    // delta negativo = futuro, delta positivo = pasado.
    for (let delta = -18; delta <= 3; delta++) {
      const d = new Date(today.getTime() - delta * 86400000);
      const dateStr = d.toISOString().slice(0,10).replace(/-/g,'');
      let data;
      try {
        const resp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`);
        data = await resp.json();
      } catch(e) { continue; }

      for (const event of (data.events || [])) {
        const comp = event.competitions?.[0];
        if (!comp) continue;

        const homeC = comp.competitors?.find(c => c.homeAway === 'home');
        const awayC = comp.competitors?.find(c => c.homeAway === 'away');
        if (!homeC || !awayC) continue;

        const slug = event.season?.slug || '';
        const completed = !!comp.status?.type?.completed;

        if (slug === 'group-stage') {
          // Grupos: solo importan los resultados (partidos completados)
          if (!completed) continue;
          const homeScore = parseInt(homeC.score, 10);
          const awayScore = parseInt(awayC.score, 10);
          if (isNaN(homeScore) || isNaN(awayScore)) continue;
          const matchId = KICKOFFS_REV[new Date(event.date).getTime()];
          if (matchId && !(S.results && S.results[matchId])) {
            savePath(`results/${matchId}`, { home: homeScore, away: awayScore });
            console.log(`[AutoSync] ${matchId}: ${homeScore}-${awayScore}`);
          }
        } else if (slug && slug !== 'group-stage') {
          // Eliminatorias: añadir el fixture AUNQUE no haya terminado,
          // para que aparezca en la quiniela antes de jugarse.
          const hn = homeC.team?.displayName || '';
          const an = awayC.team?.displayName || '';
          if (!hn || !an) continue; // equipos TBD, aún no determinados
          const hd = TEAM_NAMES[hn] || hn;
          const ad = TEAM_NAMES[an] || an;
          const koId = `espn_${event.id}`;
          if (!(S.knockoutMatches && S.knockoutMatches[koId])) {
            savePath(`knockoutMatches/${koId}`, {
              id: koId, home: hd, away: ad,
              date: spainDateStr(event.date),
              phase: 'knockout',
              roundLabel: ROUND_LABELS[slug] || 'Eliminatoria',
              group: 'KO', kickoffUTC: event.date
            });
          }
          // Guardar resultado solo si el partido ha terminado
          if (completed) {
            const homeScore = parseInt(homeC.score, 10);
            const awayScore = parseInt(awayC.score, 10);
            if (!isNaN(homeScore) && !isNaN(awayScore) && !(S.results && S.results[koId])) {
              savePath(`results/${koId}`, { home: homeScore, away: awayScore });
              console.log(`[AutoSync KO] ${koId}: ${homeScore}-${awayScore}`);
            }
          }
        } // else if (slug !== 'group-stage')
      } // for (event of data.events)
    } // for (delta)
  } catch(e) { console.log('[AutoSync] error:', e); }
  autoSyncRunning = false;
}

// Forma de un equipo en lo que va de fase de grupos (a partir de los resultados ya sincronizados)
function teamForm(teamName) {
  let w=0,d=0,l=0,gf=0,ga=0,played=0;
  GROUP_MATCHES.forEach(m => {
    const r = getResult(m.id);
    if (!r) return;
    let gfor, gag;
    if (m.home === teamName) { gfor=r.home; gag=r.away; }
    else if (m.away === teamName) { gfor=r.away; gag=r.home; }
    else return;
    played++; gf+=gfor; ga+=gag;
    if (gfor>gag) w++; else if (gfor===gag) d++; else l++;
  });
  return { played, w, d, l, gf, ga };
}
function fmtForm(f) {
  return f.played === 0 ? 'Debut en el torneo' : `${f.w}V ${f.d}E ${f.l}D · goles ${f.gf}-${f.ga}`;
}
function searchQuery(name) {
  return encodeURIComponent(name.replace(/^[^\p{L}]+/u, '').trim());
}
function getKickoffUTC(matchId) { return KICKOFFS[matchId] || null; }
function isLocked(m) {
  const ko = getKickoffUTC(m.id);
  if (ko) return new Date() >= new Date(ko);
  return m.date <= TODAY;
}
function fmtSpainTime(matchId) {
  const ko = getKickoffUTC(matchId);
  if (!ko) return '';
  // España = CEST = UTC+2 durante el Mundial
  const d = new Date(new Date(ko).getTime() + 2 * 3600000);
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const mm = String(d.getUTCMinutes()).padStart(2,'0');
  return `${hh}:${mm}h`;
}
function getResult(id) { return (S.results||{})[id] || null; }
function getPred(matchId, pi) { return ((S.predictions||{})[matchId]||{})[pi] || null; }
function hasPred(matchId, pi) {
  const p = getPred(matchId, pi);
  if (!p) return false;
  if (p.pick) return true;
  // Backward compat: old exact-only mode
  if (p.mode === 'exact') return p.scoreHome !== null && p.scoreHome !== undefined && p.scoreAway !== null && p.scoreAway !== undefined;
  return false;
}
function winner(h,a) { return h>a?'home':a>h?'away':'draw'; }
function calcPts(pred, result, phase) {
  if (!pred || !result) return null;
  const base = phase === 'group' ? 10 : 20;   // puntos por acertar ganador
  const bonus = phase === 'group' ? 20 : 40;  // puntos EXTRA por acertar también el resultado exacto
  const w = winner(result.home, result.away);
  // Backward compat: old exact-only mode (no pick)
  if (!pred.pick && pred.mode === 'exact') {
    return (Number(pred.scoreHome) === result.home && Number(pred.scoreAway) === result.away) ? base + bonus : 0;
  }
  if (!pred.pick) return null;
  if (pred.pick !== w) return 0;
  // Winner correct — check if exact score bonus applies
  const hasScore = pred.scoreHome !== null && pred.scoreHome !== undefined &&
                   pred.scoreAway !== null && pred.scoreAway !== undefined;
  if (hasScore && Number(pred.scoreHome) === result.home && Number(pred.scoreAway) === result.away) return base + bonus;
  return base;
}
function totalPts(pi) {
  let tot = 0;
  const koArr = objToArr(S.knockoutMatches);
  [...GROUP_MATCHES, ...koArr].forEach(m => {
    const r=getResult(m.id), p=getPred(m.id, pi);
    if (r && p) { const x=calcPts(p,r,m.phase||'group'); if(x) tot+=x; }
  });
  return tot;
}
function objToArr(obj) {
  if (!obj) return [];
  if (Array.isArray(obj)) return obj.filter(Boolean);
  return Object.values(obj).filter(Boolean);
}
function fmtDate(d) { return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}); }
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

  if (pwd) S.passwords[0] = pwd;
  S.setupDone = true;
  saveState();
  unlocked = [0];
  localStorage.setItem('porra_unlocked', JSON.stringify(unlocked));
  rememberMyPlayer(0);
  curPlayer = 0;
  curTab = 'quiniela';
  toast('¡Porra creada! Bienvenido ✓');
}
function saveSetup() {
  S.players = Array.from({length:NUM_PLAYERS},(_,i)=>document.getElementById(`p${i}`)?.value.trim()||`Jugador ${i+1}`);
  const passwords = {};
  for (let i=0;i<NUM_PLAYERS;i++) {
    const v = document.getElementById(`pw${i}`)?.value.trim()||'';
    if (v) passwords[i]=v;
  }

  saveState(); curTab='quiniela'; toast('Cambios guardados ✓');
}

function renderPlayerBar() {

// ─── QUINIELA ─────────────────────────────────────────────────────────────────
function renderQuiniela() {
  const filters=[{id:'all',l:'Todos'},{id:'pending',l:'Sin apostar'},{id:'today',l:'Hoy'},...GROUPS.map(g=>({id:`g${g.id}`,l:`Grupo ${g.id}`}))];
  const filterBar=`<div class="filter-bar">${filters.map(f=>`<button class="fbtn${curFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">${f.l}</button>`).join('')}</div>`;

  const koArr = objToArr(S.knockoutMatches);
  const allMatches = [...GROUP_MATCHES, ...koArr];
  let html='', lastGroup='';

  allMatches.forEach(m => {
    if (curFilter==='today' && m.date!==TODAY) return;
    if (curFilter==='pending' && hasPred(m.id,curPlayer)) return;
    if (curFilter.startsWith('g') && curFilter.length===2 && m.group!==curFilter[1]) return;

    const groupKey = m.group||'KO';
    if (groupKey !== lastGroup) {
      if (lastGroup) html+='</div>';
      const gData = GROUPS.find(g=>g.id===groupKey);
      html+=`<div class="card" style="margin-bottom:14px">
        <div class="group-header">
          <div class="group-badge${groupKey==='KO'?' ko':''}">${groupKey}</div>
          <div class="group-info">
            <h3>${groupKey==='KO'?'Fase Eliminatoria':'Grupo '+groupKey}</h3>
            ${gData?`<div class="group-teams">${gData.teams.join(' · ')}</div>`:''}
          </div>
        </div>`;
      lastGroup = groupKey;
    }
    html += renderMatchCard(m);
  });
  if (lastGroup) html+='</div>';
  if (!html) html=`<div class="card" style="text-align:center;color:var(--muted);padding:24px">No hay partidos en esta categoría 🎉</div>`;
  return filterBar + html;
}

function renderMatchCard(m) {
  const locked=isLocked(m), result=getResult(m.id), pred=getPred(m.id,curPlayer), hp=hasPred(m.id,curPlayer);
  const badge = result?`<span class="badge badge-done">✓ Final</span>`:locked?`<span class="badge badge-locked">🔒 Cerrado</span>`:`<span class="badge badge-open">✏️ Abierto</span>`;
  const scoreEl = result?`<span class="result-score">${result.home}–${result.away}</span>`:`<span class="vs-sep">vs</span>`;

  let predHtml='';
  if (locked || result) {
    if (hp) {
      const hasScore = pred.scoreHome !== null && pred.scoreHome !== undefined && pred.scoreAway !== null && pred.scoreAway !== undefined;
      const winLabel = pred.pick==='home'?m.home:pred.pick==='away'?m.away:(pred.mode==='exact'?'(exacto)':'Empate');
      let label = hasScore ? `${winLabel} · ${pred.scoreHome}–${pred.scoreAway} ⭐` : winLabel;
      if (result) {
        const pts=calcPts(pred,result,m.phase||'group');
        predHtml=`<div class="pred-info ${pts>0?'correct':'wrong'}">${pts>0?'✅':'❌'} ${label} → ${pts>0?'+'+pts+' pts':'0 pts'}</div>`;
      } else {
        predHtml=`<div class="pred-info">💬 Tu apuesta: ${label}</div>`;
      }
    } else {
      predHtml=`<div class="pred-info">— Sin apuesta</div>`;
    }
    // Show all players' predictions for this match
    predHtml += renderAllPreds(m, result);
  } else {
    const pick = pred && pred.pick;
    const sh = pred && pred.scoreHome != null ? pred.scoreHome : '';
    const sa = pred && pred.scoreAway != null ? pred.scoreAway : '';
    const pts = m.phase === 'group' ? 10 : 20;
    predHtml = `
      <div class="pick-row">
        <button class="pick-btn${pick==='home'?' sel':''}" onclick="setPick('${m.id}','home')">${m.home}</button>
        <button class="pick-btn${pick==='draw'?' sel':''}" onclick="setPick('${m.id}','draw')">Empate</button>
        <button class="pick-btn${pick==='away'?' sel':''}" onclick="setPick('${m.id}','away')">${m.away}</button>
      </div>
      <div class="score-row" style="margin-top:6px">
        <span class="score-team right" style="font-size:.8rem">${m.home}</span>
        <input class="score-in" type="number" min="0" max="20" id="sh_${m.id}" value="${sh}" placeholder="?" onblur="setScore('${m.id}','home',this.value)"/>
        <span class="score-dash">–</span>
        <input class="score-in" type="number" min="0" max="20" id="sa_${m.id}" value="${sa}" placeholder="?" onblur="setScore('${m.id}','away',this.value)"/>
        <span class="score-team" style="font-size:.8rem">${m.away}</span>
        <span style="font-size:.7rem;color:var(--muted);margin-left:6px;white-space:nowrap">⭐ opcional +${pts*2} extra</span>
      </div>`;
  }
  return `<div class="match-card${hp?' has-pred':''}">
    <div class="match-top"><span class="match-date">📅 ${fmtDate(m.date)}${m.md?' · J'+m.md:m.roundLabel?' · '+m.roundLabel:''} · ${fmtSpainTime(m.id)||'–'}</span>${badge}</div>
    <div class="teams-row"><div class="team">${m.home}</div>${scoreEl}<div class="team away">${m.away}</div></div>
    ${predHtml}
  </div>`;
}

function renderAllPreds(m, result) {
  const chips = S.players.map((name, pi) => {
    const p = getPred(m.id, pi);
    if (!p || !hasPred(m.id, pi)) return `<span class="player-pred-chip pending" title="${name}: sin apuesta">?</span>`;
    const hasScore = p.scoreHome !== null && p.scoreHome !== undefined && p.scoreAway !== null && p.scoreAway !== undefined;
    const winAbbr = p.pick==='home'?'L':p.pick==='away'?'V':'X';
    let label = hasScore ? `${p.scoreHome}–${p.scoreAway}` : winAbbr;
    let cls = 'pending';
    if (result) {
      const pts = calcPts(p, result, m.phase||'group');
      cls = pts > 0 ? 'correct' : 'wrong';
    }
    const winFull = p.pick==='home'?m.home:p.pick==='away'?m.away:'Empate';
    const full = hasScore ? `${winFull} ${p.scoreHome}–${p.scoreAway}` : winFull;
    return `<span class="player-pred-chip ${cls}" title="${name}: ${full}">${name.split(' ')[0]} ${label}</span>`;
  });
  return `<div class="all-preds">${chips.join('')}</div>`;
}

// ─── APUESTAS (registro) ──────────────────────────────────────────────────────
function renderApuestas() {
  const koArr = objToArr(S.knockoutMatches);
  const allMatches = [...GROUP_MATCHES, ...koArr];
  // Show matches that have started (locked) or finished, most recent first
  const visible = allMatches.filter(m => isLocked(m) || getResult(m.id));
  if (visible.length === 0) {
    return `<div class="card" style="text-align:center;color:var(--muted);padding:24px">Las apuestas de cada jugador se mostrarán aquí en cuanto empiece el primer partido 🔒</div>`;
  }
  visible.sort((a,b) => {
    const ka = getKickoffUTC(a.id) || a.date, kb = getKickoffUTC(b.id) || b.date;
    return new Date(kb) - new Date(ka); // most recent first
  });
  return visible.map(m => {
    const result = getResult(m.id);
    const title = result ? `${m.home} ${result.home}–${result.away} ${m.away}` : `${m.home} vs ${m.away}`;
    const sub = `${fmtDate(m.date)}${m.md?' · J'+m.md:m.roundLabel?' · '+m.roundLabel:''} · ${fmtSpainTime(m.id)||''}`;
    const rows = S.players.map((name,pi) => {
      const p = getPred(m.id, pi);
      if (!p || !hasPred(m.id, pi)) {
        return `<tr><td>${name}</td><td colspan="2" style="color:var(--muted)">— Sin apuesta —</td></tr>`;
      }
      const hasScore = p.scoreHome !== null && p.scoreHome !== undefined && p.scoreAway !== null && p.scoreAway !== undefined;
      const winLabel = p.pick==='home'?m.home:p.pick==='away'?m.away:'Empate';
      const label = hasScore ? `${winLabel} · ${p.scoreHome}–${p.scoreAway} ⭐` : winLabel;
      let ptsCell = '–';
      if (result) {
        const pts = calcPts(p, result, m.phase||'group');
        ptsCell = pts>0 ? `<span style="color:var(--success);font-weight:700">+${pts}</span>` : `<span style="color:var(--red);font-weight:700">0</span>`;
      }
      return `<tr><td>${name}</td><td>${label}</td><td style="text-align:right">${ptsCell}</td></tr>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">${title}</div>
      <p style="font-size:.78rem;color:var(--muted);margin:-6px 0 10px">${sub}</p>
      <table class="lb-table">
        <thead><tr><th>Jugador</th><th>Apuesta</th><th style="text-align:right">Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function rememberMyPlayer(i) {
  myPlayer = i;
  localStorage.setItem('porra_myplayer', String(i));
}
function selPlayer(i) {
  if (!isClaimed(i)) { openClaimModal(i); return; }
  if (unlocked.includes(i)) { curPlayer=i; rememberMyPlayer(i); render(); return; }
  const pwd = (S.passwords && S.passwords[i]) || '';
  if (!pwd) {
    // No password set for this player — allow direct access
    curPlayer=i; unlocked.push(i);
    localStorage.setItem('porra_unlocked', JSON.stringify(unlocked));
    rememberMyPlayer(i);
    render();
    return;
  }
  const input = prompt(`🔒 Contraseña de ${S.players[i]}:`);
  if (input === null) return; // cancelled
  if (input === pwd) {
    curPlayer=i; unlocked.push(i);
    localStorage.setItem('porra_unlocked', JSON.stringify(unlocked));
    rememberMyPlayer(i);
    render();
    toast(`Bienvenido, ${S.players[i]} ✓`);
  } else {
    toast('Contraseña incorrecta ❌');
  }
}

function openClaimModal(i) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <h3>👤 Unirte como ${S.players[i]}</h3>
        <p>Pon tu nombre y, si quieres, una contraseña para que nadie más pueda cambiar tus apuestas.</p>
        <input id="claimName" placeholder="Tu nombre..."/>
        <input id="claimPwd" placeholder="Contraseña (opcional)..."/>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-green" onclick="submitClaim(${i})">Unirme</button>
        </div>
      </div>
    </div>`;
  document.getElementById('claimName')?.focus();
}
function closeModal() {
  const root = document.getElementById('modal-root');
  if (root) root.innerHTML = '';
}

// ─── MODAL ADMIN: CORREGIR APUESTA DE UN JUGADOR ──────────────────────────────
let apPick = null;
function openAdminPredModal() {
  const matches = [...GROUP_MATCHES, ...objToArr(S.knockoutMatches)]
    .sort((a,b) => new Date(getKickoffUTC(a.id)||a.date) - new Date(getKickoffUTC(b.id)||b.date));
  const matchOpts = matches.map(m => `<option value="${m.id}">${m.home} vs ${m.away} · ${fmtDate(m.date)}${m.md?' (J'+m.md+')':m.roundLabel?' ('+m.roundLabel+')':''}</option>`).join('');
  const playerOpts = S.players.map((name,i) => `<option value="${i}">${name}</option>`).join('');
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <h3>🛠️ Corregir apuesta</h3>
        <p>Elige jugador y partido, revisa lo que tiene guardado y corrígelo si está mal.</p>
        <label>Jugador</label>
        <select id="apJugador" onchange="loadAdminPred()">${playerOpts}</select>
        <label>Partido</label>
        <select id="apPartido" onchange="loadAdminPred()">${matchOpts}</select>
        <div id="apActual" style="font-size:.82rem;color:var(--muted);margin-bottom:10px"></div>
        <label>Ganador</label>
        <div class="pick-row" id="apPickRow">
          <button class="pick-btn" id="apPickhome" onclick="apSetPick('home')"></button>
          <button class="pick-btn" id="apPickdraw" onclick="apSetPick('draw')">Empate</button>
          <button class="pick-btn" id="apPickaway" onclick="apSetPick('away')"></button>
        </div>
        <label style="margin-top:10px">Marcador exacto (opcional)</label>
        <div class="score-row">
          <input class="score-in" type="number" min="0" max="20" id="apScoreHome" placeholder="?"/>
          <span class="score-dash">–</span>
          <input class="score-in" type="number" min="0" max="20" id="apScoreAway" placeholder="?"/>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-green" onclick="saveAdminPred()">Guardar</button>
        </div>
      </div>
    </div>`;
  loadAdminPred();
}
function apSetPick(p) {
  apPick = p;
  ['home','draw','away'].forEach(k => document.getElementById('apPick'+k)?.classList.toggle('sel', k===p));
}
function loadAdminPred() {
  const pi = document.getElementById('apJugador')?.value;
  const mid = document.getElementById('apPartido')?.value;
  if (pi==null || !mid) return;
  const m = [...GROUP_MATCHES, ...objToArr(S.knockoutMatches)].find(x=>x.id===mid);
  if (!m) return;
  document.getElementById('apPickhome').textContent = m.home;
  document.getElementById('apPickaway').textContent = m.away;
  const pred = getPred(mid, pi);
  apPick = pred?.pick || null;
  apSetPick(apPick);
  document.getElementById('apScoreHome').value = pred?.scoreHome ?? '';
  document.getElementById('apScoreAway').value = pred?.scoreAway ?? '';
  const result = getResult(mid);
  const pickLabel = p => p==='home'?m.home:p==='away'?m.away:p==='draw'?'Empate':null;
  let info = pred ? `Apuesta guardada: <b>${pickLabel(pred.pick)||'sin ganador'}</b>` : 'Sin apuesta guardada';
  if (pred && pred.scoreHome != null && pred.scoreAway != null) info += ` (${pred.scoreHome}–${pred.scoreAway})`;
  if (result) info += ` · Resultado real: <b>${result.home}–${result.away}</b>`;
  document.getElementById('apActual').innerHTML = info;
}
function saveAdminPred() {
  const pi = document.getElementById('apJugador')?.value;
  const mid = document.getElementById('apPartido')?.value;
  if (pi==null || !mid) return;
  if (!apPick) { toast('Elige ganador o empate'); return; }
  const sh = document.getElementById('apScoreHome')?.value;
  const sa = document.getElementById('apScoreAway')?.value;
  const pred = { pick: apPick };
  let fixedWinner = false;
  if (sh !== '' && sa !== '' && sh != null && sa != null) {
    pred.scoreHome = parseInt(sh, 10);
    pred.scoreAway = parseInt(sa, 10);
    // El marcador exacto debe ser coherente con el ganador elegido:
    // si no coinciden, ajustamos el ganador para que coincida con el marcador.
    const impliedWinner = winner(pred.scoreHome, pred.scoreAway);
    if (pred.pick !== impliedWinner) {
      pred.pick = impliedWinner;
      fixedWinner = true;
    }
  } else {
    pred.scoreHome = null;
    pred.scoreAway = null;
  }
  savePath(`predictions/${mid}/${pi}`, pred);
  closeModal();
  toast(fixedWinner ? 'Apuesta corregida ✓ (ganador ajustado para coincidir con el marcador)' : 'Apuesta corregida ✓');
}
function submitClaim(i) {
  const name = document.getElementById('claimName')?.value.trim();
  if (!name) { toast('Escribe tu nombre'); return; }
  const pwd = document.getElementById('claimPwd')?.value.trim();
  S.players[i] = name;
  savePath(`players/${i}`, name);
  if (pwd) { S.passwords[i] = pwd; savePath(`passwords/${i}`, pwd); }
  unlocked.push(i);
  localStorage.setItem('porra_unlocked', JSON.stringify(unlocked));
  rememberMyPlayer(i);
  curPlayer = i;
  closeModal();
  render();
  toast(`¡Bienvenido, ${name}! ✓`);
}

function setTab(t) { curTab=t; render(); }
function setFilter(f) { curFilter=f; render(); }

function setPick(mid, pick) {
  const cur = getPred(mid, curPlayer) || {};
  const updated = {...cur, pick};
  // Si había un marcador exacto guardado que apunta a otro ganador, lo borramos:
  // no tiene sentido elegir "gana Brasil" y mantener un resultado a favor de Marruecos.
  const hadScore = cur.scoreHome !== null && cur.scoreHome !== undefined &&
                   cur.scoreAway !== null && cur.scoreAway !== undefined;
  if (hadScore && winner(cur.scoreHome, cur.scoreAway) !== pick) {
    updated.scoreHome = null;
    updated.scoreAway = null;
    savePath(`predictions/${mid}/${curPlayer}`, updated);
    toast('Apuesta guardada ✓ (se borró el marcador exacto: no coincidía con el nuevo ganador)');
    return;
  }
  savePath(`predictions/${mid}/${curPlayer}`, updated);
  toast('Apuesta guardada ✓');
}
function setScore(mid, side, val) {
  const cur = getPred(mid, curPlayer) || {};
  const n = val === '' || val === null ? null : parseInt(val, 10);
  const updated = {...cur, [side==='home'?'scoreHome':'scoreAway']: n};
  if (updated.scoreHome !== null && updated.scoreHome !== undefined &&
      updated.scoreAway !== null && updated.scoreAway !== undefined) {
    // El marcador exacto debe ser coherente con el ganador elegido: si el
    // marcador implica otro ganador, actualizamos el ganador para que coincida.
    const impliedWinner = winner(updated.scoreHome, updated.scoreAway);
    if (updated.pick !== impliedWinner) {
      updated.pick = impliedWinner;
      savePath(`predictions/${mid}/${curPlayer}`, updated);
      toast('Resultado exacto guardado ⭐ (ganador actualizado para coincidir)');
      return;
    }
    savePath(`predictions/${mid}/${curPlayer}`, updated);
    toast('Resultado exacto guardado ⭐');
    return;
  }
  savePath(`predictions/${mid}/${curPlayer}`, updated);
}
function saveResult(mid) {
  const h=document.getElementById(`rh_${mid}`)?.value, a=document.getElementById(`ra_${mid}`)?.value;
  if (h===''||a===''||h==null||a==null) { toast('Introduce los dos goles'); return; }
  savePath(`results/${mid}`, {home:parseInt(h), away:parseInt(a)});
  toast('Resultado guardado ✓');
}
function checkPin() {
  if (document.getElementById('pin')?.value==='2026') { adminOk=true; render(); }
  else toast('PIN incorrecto ❌');
}
function editNames() { curTab='setup_tab'; render(); }
function resetAll() {
  if (confirm('¿Resetear TODA la porra? Se pierden todas las apuestas y resultados.')) {
    S=defaultState(); saveState(); curTab='setup_tab'; toast('Porra reseteada');
  }
}
function addKO() {
  const home=prompt('Equipo local:'); if(!home) return;
  const away=prompt('Equipo visitante:'); if(!away) return;
  const date=prompt('Fecha (AAAA-MM-DD):','2026-07-01'); if(!date) return;
  const round=prompt('Ronda:','Ronda de 32');
  const id=`ko${koCounter++}`;
  savePath(`knockoutMatches/${id}`, {id, home, away, date, phase:'knockout', roundLabel:round||'Eliminatoria', group:'KO'});
  toast('Partido añadido ✓');
}
function delKO(mid) {
  db.ref(`${ROOT}/knockoutMatches/${mid}`).remove();
  db.ref(`${ROOT}/results/${mid}`).remove();
  db.ref(`${ROOT}/predictions/${mid}`).remove();
  toast('Partido eliminado');
}
</script>
